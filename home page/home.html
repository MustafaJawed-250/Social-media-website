<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
.navbar{
    background:#1e1e2f;
    padding:15px 30px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom: 30px;
}

.logo{
    color:white;
    font-size:24px;
    font-weight:bold;
}

.nav-btns button{
    padding:10px 20px;
    border:none;
    border-radius:5px;
    cursor:pointer;
    margin-left:10px;
}

.pp-btn{
    background:#4CAF50;
    color:white;
}

.logout-btn{
    background:#ff4d4d;
    color:white;
}
    
        .right{
    flex:1;

    display:flex;
    flex-direction:column;
    gap:15px;
}

.right input,
.right textarea{
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    outline:none;
}

.right textarea{
    resize:none;
    height:120px;
}

.post-btn{
    background:#6c63ff;
    color:white;
    border:none;
    padding:12px;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
}

.post-btn:hover{
    background:#554bdb;
}

      .ppimg{
        width: 100px;
        border-radius: 50%;
        margin-top: 40px;
        margin-left: 60px;
    }
 .ppimg{
    width: 70px;
    height: 70px;
    border-radius: 50%;
    object-fit: cover;
}

.allposts{
    display: flex;
    flex-direction: column;
    gap: 30px;
    margin: 30px auto;
    width: 100%;
    max-width: 700px;
    padding: 0 10px;
}

.posts{
    width: 100%;
    background: white;
    border: 1px solid #ccc;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

.post{
    padding: 20px;
}

.post-header{
    display: flex;
    align-items: center;
    gap: 15px;
    margin-bottom: 15px;
}

.user-info h3{
    margin: 0;
    font-size: 20px;
}

.user-info p{
    margin: 5px 0 0;
    color: gray;
    font-size: 14px;
}

.captions{
    margin: 15px 0;
    font-size: 18px;
}

.postsimg{
    width: 100%;
    max-height: 500px;
    object-fit: cover;
    border-radius: 10px;
}
@media (max-width:768px){

    .nav-btns{
        width:100%;
        display:flex;
        gap:10px;
    }

    .nav-btns button{
        flex:1;
        margin:0;
    }


    .postsimg{
        max-height:250px;
    }

    .post{
        padding:15px;
    }

    .ppimg{
        width:55px;
        height:55px;
    }

    .user-info h3{
        font-size:18px;
    }

    .captions{
        font-size:16px;
    }

    .post-btn{
        width:100%;
    }
}
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">

    <a class="logo navbar-brand" href="#">Your Profile</a>

    <button class="navbar-toggler" type="button"
      data-bs-toggle="collapse"
      data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
      <button onclick="persnolprofile()" class="pp-btn btn btn-success me-2">Home</button>
      <button onclick="logout()" class="logout-btn btn btn-danger">Logout</button>
    </div>

  </div>
</nav>









    <div class="right">

        <textarea

        id="caption"
            placeholder="Write your caption..."
        ></textarea>

        <input 
            id="imgurl"
            type="text"
            placeholder="Paste image URL"
        >

        <button onclick="post()" class="post-btn">
            Post
        </button>

       



    </div>
<div class="allposts"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script src="app.js"></script>
</body>
</html>
