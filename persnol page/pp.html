<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile Page</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<style>
    
.delete-icon{
    font-size: 20px;
    color: red;
    cursor: pointer;
    margin-right: 15px;
}

.delete-icon:hover{
    color: darkred;
}
    .ppimg{
        width: 100px;
        border-radius: 50%;
        margin-top: 40px;
        margin-left: 60px;
    }
   
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f4f4f4;
}

/* Navbar */

.navbar{
    background:#1e1e2f;
    padding:15px 30px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    color:white;
    font-size:24px;
    font-weight:bold;
}

.nav-btns button{
    padding:10px 20px;
    border:none;
    border-radius:5px;
    cursor:pointer;
    margin-left:10px;
}

.home-btn{
    background:#4CAF50;
    color:white;
}

.logout-btn{
    background:#ff4d4d;
    color:white;
}

/* Main Card */

.profile-card{
    width:90%;
    max-width:1000px;
    margin:40px auto;
    background:white;
    border-radius:12px;
    box-shadow:0 0 15px rgba(0,0,0,.15);

    display:flex;
    gap:30px;

    padding:25px;
}

/* Left */

.left{
    width:35%;
    text-align:center;
}

.left img{
    width:100px;
    height:150px;
    border-radius:50%;
    object-fit:cover;
}

.left h2{
    margin-top:15px;
}

.left p{
    color:gray;
    margin-top:8px;
}

/* Right */

.right{
    flex:1;

    display:flex;
    flex-direction:column;
    gap:15px;
}

.right input,
.right textarea{
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    outline:none;
}

.right textarea{
    resize:none;
    height:120px;
}

.post-btn{
    background:#6c63ff;
    color:white;
    border:none;
    padding:12px;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
}

.post-btn:hover{
    background:#554bdb;
}




 .ppimg{
    width: 70px;
    height: 70px;
    border-radius: 50%;
    object-fit: cover;
}

.allposts{
    display: flex;
    flex-direction: column;
    gap: 30px;
    margin: 30px auto;
    width: 700px;
}

.posts{
    width: 100%;
    background: white;
    border: 1px solid #ccc;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

.post{
    padding: 20px;
}

.post-header{
    display: flex;
    align-items: center;
    gap: 15px;
    margin-bottom: 15px;
}

.user-info h3{
    margin: 0;
    font-size: 20px;
}

.user-info p{
    margin: 5px 0 0;
    color: gray;
    font-size: 14px;
}

.captions{
    margin: 15px 0;
    font-size: 18px;
}

.postsimg{
    width: 100%;
    max-height: 500px;
    object-fit: cover;
    border-radius: 10px;
}
</style>
</head>
<body>

<nav class="navbar">
    <div class="logo">Your Profile</div>

    <div class="nav-btns">
        <button onclick="home()" class="home-btn">Home</button>
        <button onclick="logout()" class="logout-btn">Logout</button>
    </div>
</nav>

<div class="profile-card">

    <div class="left">
        <img src="New folder/dummy iamge.png">
      
        <strong><h2 id="username"></h2></strong>

        <p id="useremail"></p>

        <p id="description"></p>
<!-- Button trigger modal -->
<button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#exampleModal">
 Edit profile
</button>

<!-- Modal -->
<div class="modal fade" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h1 class="modal-title fs-5" id="exampleModalLabel">Modal title</h1>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
    <div class="modal-body">
  <h2 class="fs-5">Username</h2>
 <input type="username" id="un" placeholder="username">
  <hr>
  <h2 class="fs-5">Tooltips in a modal</h2>
 <textarea placeholder="Description" id="des"></textarea>
</div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
        <button type="button" class="btn btn-primary" data-bs-dismiss="modal" onclick="editprofile()">Save changes</button>
      </div>
    </div>
  </div>
</div>


    </div>

    <div class="right">

        <textarea

        id="caption"
            placeholder="Write your caption..."
        ></textarea>

        <input 
            id="imgurl"
            type="text"
            placeholder="Paste image URL"
        >

        <button onclick="post()" class="post-btn">
            Post
        </button>

    </div>








</div>
<div class="allposts">

     
    </div>


  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
<script src="app.js"></script>
</body>
</html>
