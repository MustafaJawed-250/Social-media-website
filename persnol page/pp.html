<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile Page</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f4f4f4;
}

/* Navbar */

.navbar{
    padding:15px 20px;
}

/* Profile Card */

.profile-card{
    background:#fff;
    border-radius:12px;
    box-shadow:0 0 15px rgba(0,0,0,.15);
    padding:25px;
}

/* Left */

.left{
    text-align:center;
}

.left img{
    width:100px;
    height:100px;
    border-radius:50%;
    object-fit:cover;
    display:block;
    margin:0 auto 15px;
}

.left h2{
    margin:10px 0;
}

.left p{
    color:#666;
    margin-bottom:10px;
}

/* Right */

.right{
    display:flex;
    flex-direction:column;
    gap:15px;
}

.right textarea,
.right input{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    outline:none;
}

.right textarea{
    resize:none;
    min-height:120px;
}

.post-btn{
    width:100%;
    background:#6c63ff;
    color:#fff;
    border:none;
    padding:12px;
    border-radius:8px;
    cursor:pointer;
}

.post-btn:hover{
    background:#554bdb;
}

/* Posts */

.allposts{
    width:100%;
    max-width:700px;
    margin:30px auto;
    padding:0 10px;
}

.posts{
    background:#fff;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 2px 8px rgba(0,0,0,.1);
    margin-bottom:25px;
}

.post{
    padding:20px;
}

.post-header{
    display:flex;
    align-items:center;
    gap:15px;
}

.ppimg{
    width:60px;
    height:60px;
    border-radius:50%;
    object-fit:cover;
}

.user-info{
    flex:1;
}

.user-info h3{
    margin:0;
    font-size:18px;
}

.user-info p{
    margin:4px 0 0;
    color:gray;
    font-size:13px;
}

.delete-icon{
    color:red;
    cursor:pointer;
    font-size:20px;
}

.captions{
    margin:15px 0;
    font-size:17px;
}

.postsimg{
    width:100%;
    border-radius:10px;
    max-height:450px;
    object-fit:cover;
}

/* Tablet */

@media (max-width:992px){

    .profile-card{
        padding:20px;
    }

    .allposts{
        max-width:95%;
    }
}

/* Mobile */

@media (max-width:768px){

    .container{
        padding:0 12px;
    }

    .profile-card{
        padding:18px;
    }

    .left{
        margin-bottom:20px;
    }

    .left img{
        width:90px;
        height:90px;
    }

    .post{
        padding:15px;
    }

    .ppimg{
        width:50px;
        height:50px;
    }

    .user-info h3{
        font-size:16px;
    }

    .user-info p{
        font-size:12px;
    }

    .captions{
        font-size:15px;
    }

    .postsimg{
        max-height:250px;
    }

    .post-header{
        gap:10px;
    }

    .delete-icon{
        margin-left:auto;
    }
}
</style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">

    <a class="navbar-brand" href="#">Your Profile</a>

    <button class="navbar-toggler" type="button"
      data-bs-toggle="collapse"
      data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
      <button onclick="home()" class="btn btn-success me-2">Home</button>
      <button onclick="logout()" class="btn btn-danger">Logout</button>
    </div>

  </div>
</nav>

<div class="container mt-4">
    <div class="profile-card row g-4 align-items-start">

        <div class="left col-lg-4 col-md-5 col-12">
        <img src="New folder/dummy iamge.png">
      
        <strong><h2 id="username"></h2></strong>

        <p id="useremail"></p>

        <p id="description"></p>
<!-- Button trigger modal -->
<button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#exampleModal">
 Edit profile
</button>

<!-- Modal -->
<div class="modal fade" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h1 class="modal-title fs-5" id="exampleModalLabel">Modal title</h1>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
    <div class="modal-body">
  <h2 class="fs-5">Username</h2>
 <input type="username" id="un" placeholder="username">
  <hr>
  <h2 class="fs-5">Tooltips in a modal</h2>
 <textarea placeholder="Description" id="des"></textarea>
</div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
        <button type="button" class="btn btn-primary" data-bs-dismiss="modal" onclick="editprofile()">Save changes</button>
      </div>
    </div>
  </div>
</div>


    </div>

     <div class="right col-lg-8 col-md-7 col-12">

        <textarea

        id="caption"
            placeholder="Write your caption..."
        ></textarea>

        <input 
            id="imgurl"
            type="text"
            placeholder="Paste image URL"
        >

        <button onclick="post()" class="post-btn">
            Post
        </button>

    </div>







    </div>
</div>
<div class="allposts">

     
    </div>


  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
<script src="app.js"></script>
</body>
</html>
