<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up</title>

<style>
    body{
        margin:0;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #1e1e2f, #3a3a5a);
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
    }

    .container{
        background:white;
        padding:30px;
        width:320px;
        border-radius:12px;
        box-shadow:0 10px 25px rgba(0,0,0,0.3);
        text-align:center;
    }

    h2{
        margin-bottom:20px;
        color:#333;
    }

    input{
        width:100%;
        padding:10px;
        margin:8px 0;
        border:1px solid #ccc;
        border-radius:6px;
        outline:none;
    }

    input:focus{
        border-color:#6c63ff;
    }

    button{
        width:100%;
        padding:10px;
        margin-top:10px;
        background:#6c63ff;
        color:white;
        border:none;
        border-radius:6px;
        cursor:pointer;
        font-size:16px;
    }

    button:hover{
        background:#574fd6;
    }

    .login-text{
        margin-top:15px;
        font-size:14px;
        color:#555;
    }

    .login-text a{
        color:#6c63ff;
        text-decoration:none;
        font-weight:bold;
    }

    .login-text a:hover{
        text-decoration:underline;
    }
</style>
</head>

<body>

<div class="container">
    <h2>Create Account</h2>

    <input id="fn" type="text" placeholder="Full Name">
    <input id="em" type="email" placeholder="Email">
    <input id="pw" type="password" placeholder="Password">
    

    <button onclick="signup()">Sign Up</button>

    <div class="login-text">
        I already have an account. <a href="./Login page/login.html">Login</a>
    </div>
</div>
<script src="app.js"></script>
</body>
</html>
